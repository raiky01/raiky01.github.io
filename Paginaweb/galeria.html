<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería — Raiky Pizza</title>
  <link rel="stylesheet" href="estilos.css">
  <style>
    .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 16px 20px; max-width: 600px; margin: 0 auto; }
    @media(min-width:480px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; transition: transform 0.2s; cursor: pointer; }
    .gallery-img:hover { transform: scale(1.03); }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="menu.html" class="navbar-logo">RAIKY <span>●</span> PIZZA</a>
  <div class="navbar-actions"><a href="menu.html" class="btn-primary" style="padding:8px 20px;font-size:13px;">🍕 Ordenar</a></div>
</nav>
<div class="hero">
  <div class="hero-tag">Nuestras creaciones</div>
  <div class="hero-title">Galería <span>de sabores</span></div>
</div>
<hr class="divider">
<div class="gallery-grid">
  <img class="gallery-img" src="hawaiana.jpg" alt="Pizza Hawaiana" loading="lazy">
  <img class="gallery-img" src="mixta.jpg" alt="Pizza Mixta" loading="lazy">
  <img class="gallery-img" src="napolitana.jpg" alt="Napolitana" loading="lazy">
  <img class="gallery-img" src="napolitana1.jpg" alt="Napolitana" loading="lazy">
  <img class="gallery-img" src="pollo.avif" alt="Pizza Pollo" loading="lazy">
  <img class="gallery-img" src="taco1.jpg" alt="Taco" loading="lazy">
  <img class="gallery-img" src="taco2.jpg" alt="Taco" loading="lazy">
  <img class="gallery-img" src="taco3.jpg" alt="Taco" loading="lazy">
  <img class="gallery-img" src="taco4.jpg" alt="Taco" loading="lazy">
  <img class="gallery-img" src="jamon.jpg" alt="Jamón" loading="lazy">
  <img class="gallery-img" src="sobre_nosotros.jpg" alt="Nuestro local" loading="lazy">
</div>
<footer class="footer"><div>© 2024 Raiky Pizza · Campeche, México</div></footer>
</body>
</html>
