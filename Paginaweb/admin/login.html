<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Raiky Pizza</title>
  <link rel="stylesheet" href="../estilos.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--azul); }
    .login-card { background:white; border-radius:16px; padding:32px 28px; width:100%; max-width:360px; box-shadow:0 8px 40px rgba(0,0,0,0.2); }
    .login-logo { text-align:center; font-size:22px; font-weight:900; color:var(--azul); margin-bottom:24px; }
    .login-logo span { color:var(--rojo); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">RAIKY <span>●</span> PIZZA<br><span style="font-size:12px;color:var(--texto-suave);font-weight:400;">Panel de administración</span></div>
  <div class="order-form">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="email" type="email" placeholder="admin@raikypizza.com" maxlength="100">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="password" type="password" placeholder="••••••••" maxlength="100">
      <span class="form-error" id="login-error"></span>
    </div>
    <button class="btn-primary" style="width:100%;margin-top:8px;" id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<script type="module">
  import { FirebaseService } from '../data/firebase-service.js';

  FirebaseService.onAuthChange(user => {
    if (user) window.location.href = 'index.html';
  });

  window.doLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Ingresa email y contraseña'; return; }

    btn.textContent = 'Entrando...';
    btn.disabled = true;
    try {
      await FirebaseService.loginAdmin(email, password);
      // onAuthChange redirige automáticamente
    } catch (err) {
      errEl.textContent = 'Email o contraseña incorrectos';
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });
</script>
</body>
</html>
