<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raiky Pizza — Campeche</title>
  <link rel="stylesheet" href="estilos.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: var(--azul); overflow: hidden; }
    .splash-bg {
      position: fixed; inset: 0; display: grid;
      grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr);
      opacity: 0.12; z-index: 0;
    }
    .splash-bg img { width: 100%; height: 100%; object-fit: cover; }
    .splash-content { position: relative; z-index: 1; text-align: center; color: var(--blanco); animation: fadeIn 0.8s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .splash-raiky { font-size: clamp(48px, 15vw, 96px); font-weight: 900; letter-spacing: -2px; animation: slideLeft 0.7s ease 0.2s both; }
    @keyframes slideLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    .splash-pizza { font-size: clamp(48px, 15vw, 96px); font-weight: 900; color: var(--rojo); letter-spacing: -2px; animation: slideRight 0.7s ease 0.2s both; }
    @keyframes slideRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    .splash-welcome { font-size: clamp(22px, 5vw, 36px); font-weight: 400; color: #aac4ff; margin: 8px 0 32px; animation: fadeIn 0.8s ease 0.5s both; }
    .splash-btn { animation: fadeIn 0.8s ease 0.8s both; }
  </style>
</head>
<body>
  <div class="splash-bg">
    <img src="hawaiana.jpg" alt=""> <img src="mixta.jpg" alt=""> <img src="napolitana.jpg" alt=""> <img src="pollo.avif" alt="">
    <img src="taco1.jpg" alt=""> <img src="taco2.jpg" alt=""> <img src="taco3.jpg" alt=""> <img src="taco4.jpg" alt="">
    <img src="jamon.jpg" alt=""> <img src="napolitana1.jpg" alt=""> <img src="sobre_nosotros.jpg" alt=""> <img src="hawaiana.jpg" alt="">
  </div>
  <div class="splash-content">
    <div class="splash-welcome">¡Bienvenidos!</div>
    <div style="display:flex; gap:16px; justify-content:center; align-items:baseline;">
      <div class="splash-raiky">Raiky</div>
      <div class="splash-pizza">Pizza</div>
    </div>
    <div style="color:#aac4ff; font-size:14px; margin: 12px 0 28px; letter-spacing:2px; text-transform:uppercase;">Campeche, México</div>
    <div class="splash-btn">
      <a href="menu.html" class="btn-primary" style="font-size:16px; padding:16px 40px;">🍕 Ver Menú</a>
    </div>
  </div>
</body>
</html>
